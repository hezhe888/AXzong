name: JK Revenue Daily Report

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date YYYYMMDD (leave empty for yesterday)'
        required: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pymysql

      - run: python jk_daily_report.py ${{ inputs.date }}
        working-directory: jack_Revenue_daily
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          PUB_MAPPING: ${{ secrets.PUB_MAPPING }}
          FEISHU_WEBHOOK: "https://open.feishu.cn/open-apis/bot/v2/hook/3e825272-d3a9-4f3b-b16f-fff6e8bd4f81"
          FEISHU_WEBHOOK_2: ${{ secrets.FEISHU_WEBHOOK_2 }}
