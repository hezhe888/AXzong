const I = ({ name, size, className, color }) => {
  const el = icons[name];
  if (!el) return null;
  return React.cloneElement(el, { style: { width: size || el.props.width, height: size || el.props.height, color: color || 'currentColor' }, className });
};

/* ========== Utils ========== */
const parseCSV = () => []; // 不再需要

const copyToClipboard = (text) => {
  const ta = document.createElement("textarea");
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
};

const extractOfferId = (s) => {
  if (!s) return "";
  const m = String(s).match(/^(\d+)/);
  return m ? m[1] : String(s);
};

const generateColors = (count) => {
  const preset = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#14b8a6','#6366f1','#eab308','#d946ef','#0ea5e9','#22c55e','#f43f5e','#a855f7','#1d4ed8','#b91c1c','#047857','#b45309','#4338ca','#be185d','#475569'];
  const colors = [];
  for (let i = 0; i < count; i++) {
    if (i < preset.length) colors.push(preset[i]);
    else colors.push(preset[i % preset.length] + 'B3');
  }
  return colors;
};

/* ========== API ========== */
const fetchReport = async (dateFrom, dateTo) => {
  const url = `${API_BASE}/api/report?date_from=${dateFrom}&date_to=${dateTo}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API error');
  return res.json();
};

const fetchDates = async () => {
  const res = await fetch(`${API_BASE}/api/dates`);
  if (!res.ok) return [];
  return res.json();
};

const fetchLatest = async () => {
  const res = await fetch(`${API_BASE}/api/latest`);
  if (!res.ok) return { latest_date: '', latest_created: '' };
  return res.json();
};

let pubNameMap = {};
const fetchPubNames = async () => {
  try {
    const res = await fetch(`${API_BASE}/api/pubnames`);
    if (res.ok) pubNameMap = await res.json();
  } catch(e) {}
};
const getPubLabel = (mid) => {
  const m = String(mid);
  if (m === 'jk-all') return 'JK综合';
  const name = pubNameMap[m];
  return name ? `${m}-${name}` : m;
};

const getAdvLabel = (src) => {
  const name = advNameMap[String(src)];
  return name ? `${src}-${name}` : String(src);
};

let advNameMap = {};
const fetchAdvNames = async () => {
  try {
    const res = await fetch(`${API_BASE}/api/advnames`);
    if (res.ok) advNameMap = await res.json();
  } catch(e) {}
};
const detectUnknown = (data) => {
  const unknownPubs = new Set();
  const unknownAdvs = new Set();
  data.forEach(d => {
    const pub = String(d['Pub ID'] || '');
    if (pub && pub !== 'jk-all' && !pubNameMap[pub]) unknownPubs.add(pub);
    const adv = String(d['Advertiser ID'] || '');
    if (adv && !advNameMap[adv]) unknownAdvs.add(adv);
  });
  return {
    pubs: Array.from(unknownPubs).sort(),
    advs: Array.from(unknownAdvs).sort()
  };
};

);

const DateRangePicker = ({ dateFrom, dateTo, onApply, onRefresh, loading }) => {
  const [availableDates, setAvailableDates] = useState([]);
  const [activeQuick, setActiveQuick] = useState('7d');
  useEffect(() => { fetchDates().then(setAvailableDates).catch(() => {}); }, []);
  const formatLabel = (d) => {
    if (!d || d.length < 8) return d;
    const m = parseInt(d.slice(4,6)), day = parseInt(d.slice(6,8));
    return `${m}月${day}日`;
  };
  const q = (label) => `px-3 py-2 rounded-lg text-xs font-bold transition-colors ${activeQuick === label ? 'bg-blue-600 text-white shadow-sm' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`;
  return (
  <div className="bg-white p-4 rounded-2xl border border-slate-200 flex items-center gap-4 flex-wrap">
    <I name="Calendar" size={20} color="#3b82f6"/>
    <div className="flex items-center gap-2">
      <select value={dateFrom} onChange={e => { setActiveQuick(null); onApply(e.target.value, dateTo); }}
        className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
        {availableDates.map(d => <option key={d} value={d}>{formatLabel(d)}</option>)}
      </select>
      <span className="text-slate-400 font-bold">→</span>
      <select value={dateTo} onChange={e => { setActiveQuick(null); onApply(dateFrom, e.target.value); }}
        className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
        {availableDates.map(d => <option key={d} value={d}>{formatLabel(d)}</option>)}
      </select>
    </div>
    <div className="flex gap-2">
      <button onClick={() => { onApply(dayOffset(0), dayOffset(0)); setActiveQuick('today'); }} className={q('today')}>今天</button>
      <button onClick={() => { onApply(dayOffset(1), dayOffset(1)); setActiveQuick('yesterday'); }} className={q('yesterday')}>昨天</button>
      <button onClick={() => { onApply(dayOffset(3), dayOffset(1)); setActiveQuick('3d'); }} className={q('3d')}>近3天</button>
      <button onClick={() => { onApply(dayOffset(7), dayOffset(1)); setActiveQuick('7d'); }} className={q('7d')}>近7天</button>
      <button onClick={() => { onApply(dayOffset(14), dayOffset(1)); setActiveQuick('14d'); }} className={q('14d')}>近14天</button>
      <button onClick={() => { onApply(dayOffset(30), dayOffset(1)); setActiveQuick('30d'); }} className={q('30d')}>近30天</button>
    </div>
    <button onClick={onRefresh} disabled={loading} className={`ml-auto px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition-all ${loading ? 'bg-slate-100 text-slate-400' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-sm'}`}>
      <I name="RefreshCw" size={14} className={loading ? 'animate-spin' : ''}/> {loading ? '加载中...' : '刷新'}
    </button>
  </div>
)};

const MultiSelect = ({ options, value = [], onChange, placeholder = "Select...", label }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [search, setSearch] = useState("");
  const wrapperRef = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setIsOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const filteredOptions = useMemo(() => {
    if (!search) return options.slice(0, 100);
    return options.filter(o => String(o.label).toLowerCase().includes(search.toLowerCase())).slice(0, 100);
  }, [options, search]);

  const toggleOption = (val) => {
    const newValue = value.includes(val) ? value.filter(v => v !== val) : [...value, val];
    onChange(newValue);
  };

  const removeValue = (e, val) => {
    e.stopPropagation();
    onChange(value.filter(v => v !== val));
  };

  return (
    <div className="relative w-full" ref={wrapperRef}>
      {label && <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">{label}</label>}
      <div className="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-1.5 min-h-[42px] flex items-center justify-between cursor-pointer hover:border-blue-500 transition-colors" onClick={() => setIsOpen(!isOpen)}>
        <div className="flex flex-wrap gap-1 flex-1 overflow-hidden">
          {value.length === 0 && <span className="text-slate-400 text-xs px-1">{placeholder}</span>}
          {value.slice(0, 3).map(val => {
              const labelText = options.find(o => o.value === val)?.label || val;
              return (<span key={val} className="bg-white border border-slate-200 text-slate-700 text-[10px] font-bold px-2 py-1 rounded-lg flex items-center gap-1 max-w-[100px] truncate"><span className="truncate">{labelText}</span><span className="cursor-pointer hover:text-rose-500 flex-shrink-0" onClick={(e) => removeValue(e, val)}><I name="X" size={10}/></span></span>);
          })}
          {value.length > 3 && <span className="bg-slate-200 text-slate-600 text-[10px] font-bold px-2 py-1 rounded-lg">+{value.length - 3}</span>}
        </div>
        <I name="ChevronRight" size={16} className={`text-slate-400 transition-transform shrink-0 ml-2 ${isOpen ? "rotate-90" : ""}`}/>
      </div>
      {isOpen && (
        <div className="absolute top-full left-0 w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-xl z-50 overflow-hidden">
          <div className="p-2 border-b border-slate-50">
            <div className="flex items-center gap-2 bg-slate-50 px-2 py-1.5 rounded-lg">
              <I name="Search" size={14} className="text-slate-400"/>
              <input autoFocus className="bg-transparent text-xs font-bold text-slate-700 outline-none w-full" placeholder="搜索..." value={search} onChange={(e) => setSearch(e.target.value)}/>
              {search && <button onClick={() => setSearch('')}><I name="X" size={12} className="text-slate-400 hover:text-slate-600"/></button>}
            </div>
          </div>
          <div className="max-h-60 overflow-y-auto p-1">
            {filteredOptions.length > 0 ? (
              filteredOptions.map(opt => {
                const isSelected = value.includes(opt.value);
                return (
                  <button key={opt.value} onClick={() => toggleOption(opt.value)} className={`w-full text-left px-3 py-2 rounded-lg text-xs font-bold transition-colors flex items-center justify-between ${isSelected ? 'bg-blue-50 text-blue-600' : 'text-slate-600 hover:bg-slate-50'}`}>
                    <span className="truncate">{opt.label}</span>
                    {isSelected && <I name="Check" size={14}/>}
                  </button>
                );
              })
            ) : <div className="px-3 py-4 text-center text-xs text-slate-400 font-medium">无匹配项</div>}
          </div>
        </div>
      )}
    </div>
  );
};

const SearchSelect = ({ options, value, onChange, placeholder = '全部' }) => {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h);
  }, []);
  const selected = options.find(o => o.value === value);
  const filtered = useMemo(() => {
    if (!search) return options.slice(0, 50);
    return options.filter(o => String(o.label).toLowerCase().includes(search.toLowerCase())).slice(0, 50);
  }, [options, search]);
  return (
    <div className="relative" ref={ref}>
      <div onClick={() => { setOpen(!open); setSearch(''); }} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-bold cursor-pointer hover:border-orange-400 min-w-[120px] flex items-center gap-1">
        <span className={`truncate ${selected ? 'text-slate-700' : 'text-slate-400'}`}>{selected ? selected.label : placeholder}</span>
        <I name="ChevronRight" size={12} className={`text-slate-400 ml-auto shrink-0 transition-transform ${open ? 'rotate-90' : ''}`}/>
      </div>
      {open && (
        <div className="absolute top-full left-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-xl z-50 w-56">
          <div className="p-2 border-b border-slate-50">
            <div className="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded-lg">
              <I name="Search" size={12} className="text-slate-400"/>
              <input autoFocus className="bg-transparent text-xs font-bold text-slate-700 outline-none w-full" placeholder="搜索..." value={search} onChange={e => setSearch(e.target.value)}/>
              {search && <button onClick={() => setSearch('')}><I name="X" size={10} className="text-slate-400"/></button>}
            </div>
          </div>
          <div className="max-h-48 overflow-y-auto p-1">
            {filtered.map(o => (
              <button key={o.value} onClick={() => { onChange(o.value); setOpen(false); }}
                className={`w-full text-left px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${o.value === value ? 'bg-orange-50 text-orange-600' : 'text-slate-600 hover:bg-slate-50'}`}>
                {o.label}
              </button>
            ))}
          </div>
        </div>
      )}

  );
};

const SimpleBarChart = ({ data, dataKey, labelKey, color, unit = '', title, colors }) => {
  if (!data || data.length === 0) return <div className="text-slate-400 text-xs italic">无数据</div>;
  const sortedData = [...data].sort((a, b) => b[dataKey] - a[dataKey]);
  const maxValue = Math.max(...sortedData.map(d => d[dataKey])) || 1;
  return (
    <div className="space-y-3">
      <h4 className="text-xs font-black text-slate-500 uppercase tracking-wider flex items-center gap-2">{title}</h4>
      <div className="space-y-2">
        {sortedData.map((item, i) => {
          const ratio = (item[dataKey] / maxValue);
          const width = Math.max(5, ratio * 100);
          const barColor = colors ? colors[i % colors.length] : color;
          return (
            <div key={i} className="flex items-center gap-3 text-xs group">
              <div className="w-44 text-right font-bold text-slate-600 truncate" title={item[labelKey]}>{item[labelKey]}</div>
              <div className="flex-1 h-6 bg-slate-50 rounded-md overflow-hidden relative">
                <div className="h-full rounded-md transition-all duration-500 ease-out flex items-center justify-end px-2" style={{ width: `${width}%`, backgroundColor: barColor }}>
                  <span className="text-[10px] font-black text-white drop-shadow-md">{unit}{item[dataKey].toFixed(2)}{unit === '%' ? '%' : ''}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

const MultiTrendChart = ({ data, activeMetrics, metricsConfig }) => {
  const [hoverIndex, setHoverIndex] = useState(null);
  const chartRef = useRef(null);
  const [containerWidth, setContainerWidth] = useState(1000);
  useEffect(() => {
    if (!chartRef.current) return;
    const ro = new ResizeObserver(entries => { for (let e of entries) setContainerWidth(e.contentRect.width); });
    ro.observe(chartRef.current);
    return () => ro.disconnect();
  }, []);
  if (!data || data.length < 2) return (
    <div className="h-full min-h-[200px] flex flex-col items-center justify-center bg-slate-50 rounded-2xl border border-dashed border-slate-200 text-slate-400 text-xs gap-2">
      <I name="LineChart" size={20} className="opacity-20"/><span>数据不足 (需2天+)</span>
    </div>
  );
  const sortedData = [...data].sort((a, b) => String(a.date).localeCompare(String(b.date)));
  const width = containerWidth;
  const height = 400;
  const pL = 60, pR = 60, pT = 30, pB = 40;
  const chartWidth = width - pL - pR;
  const chartHeight = height - pT - pB;

  const standardMetrics = ['Payout', 'Revenue', 'Click', 'Conversion', 'CVR', 'eCPC'];
  const isMetricComparison = activeMetrics.length > 0 && activeMetrics.every(m => standardMetrics.includes(m));
  let chartMode = 'single';
  if (isMetricComparison) {
    if (activeMetrics.length === 2) chartMode = 'dual';
    else if (activeMetrics.length >= 3) chartMode = 'normalized';
  } else chartMode = 'shared';

  const maxValues = {};
  let globalMax = -Infinity;
  activeMetrics.forEach(key => {
    const vals = sortedData.map(d => Number(d[key]) || 0);
    let m = Math.max(...vals);
    if (m <= 0) m = 10;
    maxValues[key] = m;
    globalMax = Math.max(globalMax, m);
  });
  if (globalMax <= 0) globalMax = 10;

  const yTickRatios = [0, 0.25, 0.5, 0.75, 1];
  const yTicks = yTickRatios.map(r => {
    const y = height - pB - (r * chartHeight);
    let leftLabel = '';
    let rightLabel = '';
    if (chartMode === 'normalized') leftLabel = `${(r * 100).toFixed(0)}%`;
    else if (chartMode === 'dual') {
      leftLabel = (maxValues[activeMetrics[0]] * r).toLocaleString(undefined, {maximumFractionDigits:0});
      rightLabel = (maxValues[activeMetrics[1]] * r).toLocaleString(undefined, {maximumFractionDigits:0});
    } else {
      const currentMax = (chartMode === 'shared') ? globalMax : maxValues[activeMetrics[0]];
      leftLabel = (currentMax * r).toLocaleString(undefined, {maximumFractionDigits:0});
    }
    return { y, leftLabel, rightLabel };
  });

  const paths = activeMetrics.map((key) => {
    let currentMax;
    if (chartMode === 'normalized') currentMax = maxValues[key];
    else if (chartMode === 'dual') currentMax = maxValues[key];
    else if (chartMode === 'shared') currentMax = globalMax;
    else currentMax = maxValues[key];
    const displayMax = currentMax * 1.05;
    const points = sortedData.map((d, i) => {
      const x = pL + (i * chartWidth / (sortedData.length - 1));
      const val = Number(d[key]) || 0;
      const normalizedVal = val / displayMax;
      const y = height - pB - (normalizedVal * chartHeight);
      return { x, y, raw: val };
    });
    return {
      key,
      pathD: points.length > 0 ? `M ${points[0].x} ${points[0].y} ` + points.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ') : "",
      points,
      color: metricsConfig.find(m => m.key === key)?.color || '#94a3b8'
    };
  });

  const handleMouseMove = (e) => {
    if (!chartRef.current) return;
    const rect = chartRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const relativeX = x - pL;
    const dynamicChartWidth = width - pL - pR;
    let index = Math.round((relativeX / dynamicChartWidth) * (sortedData.length - 1));
    index = Math.max(0, Math.min(index, sortedData.length - 1));
    setHoverIndex(index);
  };

  return (
    <div className="relative w-full h-full overflow-hidden select-none" onMouseMove={handleMouseMove} onMouseLeave={() => setHoverIndex(null)} ref={chartRef}>
      {hoverIndex !== null && (
        <div className="absolute z-10 bg-slate-900/95 backdrop-blur-sm text-white p-3 rounded-lg shadow-xl pointer-events-none border border-slate-700/50" style={{ left: 20, top: 20 }}>
          <div className="text-[10px] font-black text-slate-400 mb-1 flex items-center gap-2"><I name="Calendar" size={10}/> {String(sortedData[hoverIndex].date).slice(4)}</div>
          <div className="space-y-1">
            {activeMetrics.map(key => {
              const cfg = metricsConfig.find(m => m.key === key) || { label: key, color: '#94a3b8' };
              const val = sortedData[hoverIndex][key];
              let pctChange = null;
              if (hoverIndex > 0) {
                const prevVal = Number(sortedData[hoverIndex - 1][key]) || 0;
                const currVal = Number(val) || 0;
                if (prevVal !== 0) {
                  const pct = ((currVal - prevVal) / prevVal) * 100;
                  const isPositive = pct >= 0;
                  pctChange = <span className={`ml-1.5 ${isPositive ? 'text-emerald-400' : 'text-rose-400'}`}>{isPositive ? '+' : ''}{pct.toFixed(1)}%</span>;
                }
              }
              return (
                <div key={key} className="flex items-center gap-3 text-[10px]">
                  <span className="flex items-center gap-1.5 font-bold truncate max-w-[120px]" style={{color: cfg.color}}><div className="w-1.5 h-1.5 rounded-full" style={{backgroundColor: cfg.color}}></div> {cfg.label}</span>
                  <span className="font-mono font-bold ml-auto flex items-center">{Number(val).toLocaleString(undefined, {maximumFractionDigits: 2})}{pctChange}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full" preserveAspectRatio="none">
        {yTicks.map((tick, i) => (
          <g key={i}>
            <line x1={pL} y1={tick.y} x2={width - pR} y2={tick.y} stroke="#F1F5F9" strokeWidth="1" strokeDasharray="4 4"/>
            <text x={pL - 8} y={tick.y + 4} textAnchor="end" className="fill-slate-400 text-[10px] font-mono font-bold">{tick.leftLabel}</text>
            {chartMode === 'dual' && tick.rightLabel && <text x={width - pR + 8} y={tick.y + 4} textAnchor="start" className="fill-slate-400 text-[10px] font-mono font-bold">{tick.rightLabel}</text>}
          </g>
        ))}
        {paths.map(p => (
          <g key={p.key}>
            <path d={p.pathD} fill="none" stroke={p.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-sm opacity-90"/>
            {hoverIndex !== null && p.points[hoverIndex] && <circle cx={p.points[hoverIndex].x} cy={p.points[hoverIndex].y} r="4" fill={p.color} stroke="white" strokeWidth="2"/>}
          </g>
        ))}
        {hoverIndex !== null && paths[0] && <line x1={paths[0].points[hoverIndex].x} y1={pT} x2={paths[0].points[hoverIndex].x} y2={height - pB} stroke="#94A3B8" strokeWidth="1" strokeDasharray="4 4"/>}
        {sortedData.map((d, i) => {
          const step = Math.ceil(sortedData.length / 8);
          if (i === 0 || i === sortedData.length - 1 || i % step === 0) {
            const x = pL + (i * chartWidth / (sortedData.length - 1));
            return <text key={i} x={x} y={height - 10} textAnchor="middle" className="fill-slate-400 text-[10px] font-mono font-bold">{String(d.date).slice(4)}</text>;
          }
          return null;
        })}
      </svg>
    </div>
  );
};

const DashboardView = ({ data }) => {
  const stats = useMemo(() => ({
    revenue: data.reduce((a, b) => a + (Number(b.Revenue) || 0), 0),
    conv: data.reduce((a, b) => a + (Number(b.Conversion) || 0), 0),
    clicks: data.reduce((a, b) => a + (Number(b.Click) || 0), 0),
    offers: new Set(data.map(d => d.Offer)).size
  }), [data]);

  const channelData = useMemo(() => {
    const dailyByPub = {};
    const pubTotals = {};
    const allDates = new Set();
    data.forEach(d => {
      const date = d.Date;
      const pub = String(d['Pub ID'] || 'Unknown');
      const rev = Number(d.Revenue) || 0;
      allDates.add(date);
      pubTotals[pub] = (pubTotals[pub] || 0) + rev;
      if (!dailyByPub[date]) dailyByPub[date] = {};
      dailyByPub[date][pub] = (dailyByPub[date][pub] || 0) + rev;
    });
    const topPubs = Object.entries(pubTotals).sort((a,b) => b[1] - a[1]).slice(0, 10).map(e => e[0]);
    const sortedDates = Array.from(allDates).sort((a,b) => String(a).localeCompare(String(b)));
    const chartRows = sortedDates.map(date => {
      const row = { date };
      topPubs.forEach(pub => row[pub] = dailyByPub[date]?.[pub] || 0);
      return row;
    });
    const dynamicColors = generateColors(topPubs.length);
    const metricsConfig = topPubs.map((pub, i) => ({ key: pub, label: getPubLabel(pub), color: dynamicColors[i] }));
    return { data: chartRows, activeMetrics: topPubs, metricsConfig };
  }, [data]);

  const isSingleDay = useMemo(() => {
    const dates = new Set(data.map(d => d.Date));
    return dates.size <= 1;
  }, [data]);

  const barChartData = useMemo(() => {
    if (!isSingleDay) return [];
    const pubRev = {};
    data.forEach(d => {
      const pub = getPubLabel(String(d['Pub ID'] || 'Unknown'));
      pubRev[pub] = (pubRev[pub] || 0) + (Number(d.Revenue) || 0);
    });
    return Object.entries(pubRev).map(([id, rev]) => ({ id, rev })).sort((a, b) => b.rev - a.rev);
  }, [data, isSingleDay]);

  return (
    <div className="space-y-8 w-full flex flex-col" style={{minHeight: 'calc(100vh - 200px)'}}>
      <div className="grid grid-cols-1 md:grid-cols-4 gap-6 shrink-0">
        <StatCard title="总营收" value={`$${stats.revenue.toLocaleString()}`} iconName="DollarSign"/>
        <StatCard title="总转化" value={stats.conv.toLocaleString()} iconName="CheckCircle2"/>
        <StatCard title="总点击" value={stats.clicks.toLocaleString()} iconName="ArrowRightLeft"/>
        <StatCard title="Offer 总数" value={stats.offers} iconName="Target"/>
      </div>
      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col flex-1 min-h-0">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <I name="TrendingUp" size={18} color="#2563eb"/>
            <h3 className="font-black text-slate-800 text-sm uppercase tracking-widest">分渠道营收趋势</h3>
          </div>
          <div className="flex flex-wrap gap-3">
            {channelData.metricsConfig.map(c => (
              <div key={c.key} className="flex items-center gap-1.5 text-[10px] font-bold text-slate-500"><div className="w-2 h-2 rounded-full" style={{backgroundColor: c.color}}></div>{c.label}</div>
            ))}
          </div>
        </div>
        <div className="flex-1 w-full min-h-0">
          {isSingleDay ? (
            <SimpleBarChart data={barChartData} dataKey="rev" labelKey="id" color="#3b82f6" unit="$" title="各渠道营收" colors={generateColors(barChartData.length)} />
          ) : (
            <MultiTrendChart data={channelData.data} activeMetrics={channelData.activeMetrics} metricsConfig={channelData.metricsConfig}/>
          )}
        </div>
      </div>
    </div>
  );
};

const TrendExplorerView = ({ data }) => {
  const dims = ['Pub ID', 'Advertiser ID', 'Package Name', 'Offer'];
  const dimLabels = { 'Pub ID': '渠道', 'Advertiser ID': '广告主', 'Package Name': '包名', 'Offer': 'Offer' };
  const [dimKey, setDimKey] = useState('Pub ID');
  const [selectedItems, setSelectedItems] = useState([]);
  const [activeMetrics, setActiveMetrics] = useState(['Revenue']);
  const [crossFilters, setCrossFilters] = useState({});
  const metricsAll = ['Revenue', 'Payout', 'Click', 'CVR', 'eCPC'];

  const getFmt = (dk) => dk === 'Offer' ? extractOfferId : (dk === 'Pub ID' ? getPubLabel : (dk === 'Advertiser ID' ? getAdvLabel : (s => s)));

  const dimOptions = useMemo(() => {
    const fmt = getFmt(dimKey);
    const unique = new Set(data.map(d => d[dimKey]).filter(Boolean));
    return Array.from(unique).sort().map(v => ({ label: fmt(v), value: v }));
  }, [data, dimKey]);

  const crossDims = dims;

  const crossOptions = useMemo(() => {
    const opts = {};
    crossDims.forEach(dk => {
      const fmt = getFmt(dk);
      const unique = new Set(data.map(d => d[dk]).filter(Boolean));
      opts[dk] = [{ label: '全部', value: '' }, ...Array.from(unique).sort().map(v => ({ label: fmt(v), value: v }))];
    });
    return opts;
  }, [data, crossDims]);

  const topItems = useMemo(() => {
    let filtered = data;
    Object.entries(crossFilters).forEach(([dk, val]) => { if (val) filtered = filtered.filter(d => String(d[dk]) === val); });
    const totals = {}; filtered.forEach(d => { const v = d[dimKey]; if (!v) return; totals[v] = (totals[v] || 0) + (Number(d.Revenue) || 0); });
    return Object.entries(totals).sort((a, b) => b[1] - a[1]).slice(0, 5).map(e => e[0]);
  }, [data, dimKey, crossFilters]);

  const items = selectedItems.length > 0 ? selectedItems.slice(0, 5) : topItems;

  const chartData = useMemo(() => {
    const fmt = getFmt(dimKey);
    const byDate = {};
    data.forEach(d => {
      let skip = false;
      Object.entries(crossFilters).forEach(([dk, val]) => { if (val && String(d[dk]) !== val) skip = true; });
      if (skip) return;
      const raw = d[dimKey]; if (!raw || !items.includes(raw)) return;
      const date = d.Date; if (!byDate[date]) byDate[date] = {};
      if (!byDate[date][raw]) byDate[date][raw] = { payout: 0, rev: 0, click: 0, cbconv: 0 };
      byDate[date][raw].payout += (Number(d.Payout) || 0);
      byDate[date][raw].rev += (Number(d.Revenue) || 0);
      byDate[date][raw].click += (Number(d.Click) || 0);
      byDate[date][raw].cbconv += (Number(d['Callback Conversion']) || 0);
    });
    const sortedDates = Object.keys(byDate).sort((a, b) => String(a).localeCompare(String(b)));
    const chartRows = sortedDates.map(date => {
      const row = { date };
      items.forEach(item => {
        const s = byDate[date]?.[item];
        if (s) {
          row[item + ' Payout'] = s.payout;
          row[item + ' Revenue'] = s.rev;
          row[item + ' Click'] = s.click;
          row[item + ' CVR'] = s.click > 0 ? (s.cbconv / s.click) * 100 : 0;
          row[item + ' eCPC'] = s.click > 0 ? (s.payout / s.click) * 1000 : 0;
        }
      });
      return row;
    });
    const activeKeys = [];
    const colors = generateColors(items.length * activeMetrics.length);
    items.forEach(item => {
      activeMetrics.forEach(m => { activeKeys.push(item + ' ' + m); });
    });
    const mc = activeKeys.map((k, i) => {
      const parts = k.split(' ');
      const itemName = fmt(parts.slice(0, -1).join(' '));
      return { key: k, label: itemName + ' ' + parts[parts.length - 1], color: colors[i % colors.length] };
    });
    return { data: chartRows, activeMetrics: activeKeys, metricsConfig: mc };
  }, [data, dimKey, items, activeMetrics, crossFilters]);

  const toggleMetric = (m) => {
    setActiveMetrics(prev => prev.includes(m) ? (prev.length > 1 ? prev.filter(k => k !== m) : prev) : [...prev, m]);
  };

  return (
    <div className="space-y-6 w-full" style={{minHeight: 'calc(100vh - 200px)'}}>
      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col gap-4">
        <div className="flex gap-2 bg-slate-100 p-1 rounded-xl self-start">
          {dims.map(d => (
            <button key={d} onClick={() => { setDimKey(d); setSelectedItems([]); setCrossFilters({}); }}
              className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${dimKey === d ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{dimLabels[d]}</button>
          ))}
        </div>
        <div className="flex items-center gap-4 flex-wrap">
          <span className="text-[10px] font-black text-slate-400 uppercase">选择对象（≤5）</span>
          <div className="flex-1 max-w-xl"><MultiSelect options={dimOptions} value={selectedItems} onChange={setSelectedItems} placeholder={selectedItems.length === 0 ? '留空=Top5营收' : ''}/></div>
        </div>
        {crossDims.length > 0 && (
          <div className="flex items-center gap-3 flex-wrap border-t border-slate-100 pt-3">
            <span className="text-[10px] font-black text-slate-400 uppercase">交叉筛选</span>
            {crossDims.map(dk => (
              <div key={dk} className="flex items-center gap-1.5">
                <span className="text-[10px] text-slate-400">{dimLabels[dk]}:</span>
                <SearchSelect options={crossOptions[dk] || []} value={crossFilters[dk] || ''} onChange={v => setCrossFilters(prev => { const nx = { ...prev }; nx[dk] = v; return nx; })}/>
              </div>
            ))}
          </div>
        )}
        <div className="flex gap-2 bg-slate-50 p-1.5 rounded-xl self-start flex-wrap">
          {metricsAll.map(m => {
            const isActive = activeMetrics.includes(m);
            return (<button key={m} onClick={() => toggleMetric(m)} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${isActive ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{m}</button>);
          })}
          <span className="w-px h-5 bg-slate-200 mx-1"></span>
          <button onClick={() => { setSelectedItems([]); setActiveMetrics(['Revenue']); setCrossFilters({}); }}

const TrendAnalysisView = ({ data }) => {
  const [selectedPubs, setSelectedPubs] = useState([]);
  const [selectedAdvs, setSelectedAdvs] = useState([]);
  const [selectedPkgs, setSelectedPkgs] = useState([]);
  const [selectedOffers, setSelectedOffers] = useState([]);
  const [activeMetrics, setActiveMetrics] = useState(['Payout']);
  const metricOptions = ['Payout', 'Click', 'Conversion', 'CVR', 'eCPC'];

  const getOptions = (key, formatter = s => s) => useMemo(() => {
    const unique = new Set(data.map(d => d[key]).filter(Boolean));
    return Array.from(unique).sort().map(v => ({ label: formatter(v), value: v }));
  }, [data]);

  const pubOptions = getOptions('Pub ID', s => getPubLabel(s));
  const advOptions = getOptions('Advertiser ID');
  const pkgOptions = getOptions('Package Name');
  const offerOptions = getOptions('Offer', extractOfferId);

  const filteredData = useMemo(() => {
    return data.filter(d => {
      const matchPub = selectedPubs.length === 0 || selectedPubs.includes(d['Pub ID']);
      const matchAdv = selectedAdvs.length === 0 || selectedAdvs.includes(d['Advertiser ID']);
      const matchPkg = selectedPkgs.length === 0 || selectedPkgs.includes(d['Package Name']);
      const matchOffer = selectedOffers.length === 0 || selectedOffers.includes(d['Offer']);
      return matchPub && matchAdv && matchPkg && matchOffer;
    });
  }, [data, selectedPubs, selectedAdvs, selectedPkgs, selectedOffers]);

  const toggleMetric = (key) => {
    setActiveMetrics(prev => {
      if (prev.includes(key)) { if (prev.length === 1) return prev; return prev.filter(k => k !== key); }
      return [...prev, key];
    });
  };

  const prepareChartData = (dimKey, selectedItems, labelFormatter = s => s) => {
    const primaryMetric = activeMetrics[0] || 'Payout';
    const grouped = {}; const allDates = new Set();
    filteredData.forEach(d => {
      const rawItem = d[dimKey] || 'Unknown';
      const item = labelFormatter(rawItem);
      const date = d.Date;
      allDates.add(date);
      const dataVal = primaryMetric === 'Payout' ? (d.Payout !== undefined ? d.Payout : d.Revenue) : d[primaryMetric];
      const mainVal = Number(dataVal) || 0;
      if (!grouped[rawItem]) grouped[rawItem] = { totalMainMetric: 0, byDate: {} };
      grouped[rawItem].totalMainMetric += mainVal;
      if (!grouped[rawItem].byDate[date]) grouped[rawItem].byDate[date] = {};
      grouped[rawItem].byDate[date][primaryMetric] = (grouped[rawItem].byDate[date][primaryMetric] || 0) + mainVal;
    });
    const sortedDates = Array.from(allDates).sort((a,b) => String(a).localeCompare(String(b)));
    let itemsToDisplay = [];
    if (selectedItems.length > 0) {
      itemsToDisplay = selectedItems;
    } else {
      itemsToDisplay = Object.entries(grouped).sort((a, b) => b[1].totalMainMetric - a[1].totalMainMetric).slice(0, 5).map(e => e[0]);
    }
    const chartRows = sortedDates.map(date => {
      const row = { date };
      itemsToDisplay.forEach(item => { row[item] = grouped[item]?.byDate[date]?.[primaryMetric] || 0; });
      return row;
    });
    const dynamicColors = generateColors(itemsToDisplay.length);
    return {
      data: chartRows,
      activeMetrics: itemsToDisplay,
      metricsConfig: itemsToDisplay.map((item, i) => ({ key: item, label: labelFormatter(item), color: dynamicColors[i] }))
    };
  };

  const overviewChartData = useMemo(() => {
    const dailyTotals = {}; const allDates = new Set();
    filteredData.forEach(d => {
      const date = d.Date; allDates.add(date);
      if (!dailyTotals[date]) dailyTotals[date] = {};
      activeMetrics.forEach(m => {
        const dataVal = m === 'Payout' ? (d.Payout !== undefined ? d.Payout : d.Revenue) : d[m];
        dailyTotals[date][m] = (dailyTotals[date][m] || 0) + (Number(dataVal) || 0);
      });
    });
    const sortedDates = Array.from(allDates).sort((a,b) => String(a).localeCompare(String(b)));
    const dynamicColors = generateColors(activeMetrics.length);
    return {
      data: sortedDates.map(date => ({ date, ...dailyTotals[date] })),
      activeMetrics: activeMetrics,
      metricsConfig: activeMetrics.map((m, i) => ({ key: m, label: m, color: dynamicColors[i] }))
    };
  }, [filteredData, activeMetrics]);

  return (
    <div className="space-y-6 w-full flex flex-col" style={{minHeight: 'calc(100vh - 200px)'}}>
      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col gap-6 shrink-0">
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 w-full">
          <MultiSelect label="Advertiser (广告主)" options={advOptions} value={selectedAdvs} onChange={setSelectedAdvs} placeholder="全部广告主"/>
          <MultiSelect label="Publisher (渠道)" options={pubOptions} value={selectedPubs} onChange={setSelectedPubs} placeholder="全部渠道"/>
          <MultiSelect label="Package (包名)" options={pkgOptions} value={selectedPkgs} onChange={setSelectedPkgs} placeholder="全部包名"/>
          <MultiSelect label="Offer" options={offerOptions} value={selectedOffers} onChange={setSelectedOffers} placeholder="全部 Offer"/>
        </div>
        <div className="flex gap-2 bg-slate-50 p-1.5 rounded-xl self-start">
          {metricOptions.map(m => {
            const isActive = activeMetrics.includes(m);
            return (
              <button key={m} onClick={() => toggleMetric(m)} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${isActive ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                {isActive && <div className="w-1.5 h-1.5 rounded-full bg-blue-600"></div>} {m}
              </button>
            );
          })}
        </div>
      </div>
      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col flex-1 min-h-0">
        <div className="flex items-center gap-2 mb-2"><I name="Activity" size={16}/> <h3 className="font-black text-slate-700 text-xs uppercase tracking-widest">综合趋势概览</h3></div>
        <div className="flex flex-wrap gap-x-4 gap-y-1 mb-2">{overviewChartData.metricsConfig.map((cfg, i) => (<div key={i} className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full" style={{ backgroundColor: cfg.color }}></div><span className="text-[10px] font-bold text-slate-500">{cfg.label}</span></div>))}</div>
        <div className="flex-1 min-h-0"><MultiTrendChart data={overviewChartData.data} activeMetrics={overviewChartData.activeMetrics} metricsConfig={overviewChartData.metricsConfig}/></div>
      </div>
      <div className="grid grid-cols-1 gap-8">
        <ChartCard title="渠道趋势" iconName="ArrowRightLeft" chartData={prepareChartData('Pub ID', selectedPubs, s => getPubLabel(s))} metric={activeMetrics[0]}/>
        <ChartCard title="Offer 趋势" iconName="Target" chartData={prepareChartData('Offer', selectedOffers, extractOfferId)} metric={activeMetrics[0]}/>
        <ChartCard title="广告主趋势" iconName="Award" chartData={prepareChartData('Advertiser ID', selectedAdvs)} metric={activeMetrics[0]}/>
        <ChartCard title="包名趋势" iconName="Package" chartData={prepareChartData('Package Name', selectedPkgs)} metric={activeMetrics[0]}/>
      </div>
    </div>
  );
};

const AnomalyView = ({ data, onCopy }) => {
  const dates = useMemo(() => Array.from(new Set(data.map(d => String(d.Date)))).sort((a, b) => String(b).localeCompare(String(a))), [data]);
  const [selectedDates, setSelectedDates] = useState({ base: '', target: '' });
  const [offerSearchTerm, setOfferSearchTerm] = useState('');
  const [minDropPct, setMinDropPct] = useState('80');
  const [minDropAmt, setMinDropAmt] = useState('2');
  const [minBaseRev, setMinBaseRev] = useState(2);
  const [selectedOfferForDetail, setSelectedOfferForDetail] = useState(null);
  const [modalMetric, setModalMetric] = useState('Payout');

  useEffect(() => { if (dates.length >= 2) setSelectedDates({ base: dates[1], target: dates[0] }); }, [dates]);

  const handleQuickCompare = (baseIndex, targetIndex) => {
    if (dates[baseIndex] && dates[targetIndex]) setSelectedDates({ base: dates[baseIndex], target: dates[targetIndex] });
  };

  const anomalyGroups = useMemo(() => {
    if (!selectedDates.base || !selectedDates.target) return {};
    const getDailyMap = (date) => data.filter(d => String(d.Date) === date).reduce((acc, d) => {
      const oid = extractOfferId(d.Offer), pubId = d['Pub ID'] || 'Unknown', key = `${oid}_${pubId}`;
      if (!acc[key]) acc[key] = { id: oid, pubId, revenue: 0, pkg: d['Package Name'] || '', geo: d['Adv GEO'] || d['Country'] || '' };
      acc[key].revenue += (Number(d.Payout !== undefined ? d.Payout : d.Revenue) || 0);
      return acc;
    }, {});
    const targetMap = getDailyMap(selectedDates.target);
    const res = [];

    if (selectedDates.base === 'max') {
      const maxMap = {};
      dates.forEach(date => {
        const dMap = getDailyMap(date);
        Object.keys(dMap).forEach(key => { if (!maxMap[key] || dMap[key].revenue > maxMap[key].revenue) maxMap[key] = { ...dMap[key], maxDate: date }; });
      });
      Object.keys(maxMap).forEach(key => {
        const bRev = maxMap[key].revenue, tRev = targetMap[key]?.revenue || 0;
        const dropAmt = bRev - tRev;
        const dropPct = bRev > 0 ? (dropAmt / bRev) * 100 : 0;
        let isAnomaly = false;
        const hasPct = minDropPct !== '', hasAmt = minDropAmt !== '';
        if (hasPct && hasAmt) isAnomaly = dropPct >= Number(minDropPct) || dropAmt >= Number(minDropAmt);
        else if (hasPct) isAnomaly = dropPct >= Number(minDropPct);
        else if (hasAmt) isAnomaly = dropAmt >= Number(minDropAmt);
        else isAnomaly = dropAmt > 0;
        if (bRev >= minBaseRev && isAnomaly) {
          if (!offerSearchTerm || maxMap[key].id.includes(offerSearchTerm)) res.push({ ...maxMap[key], baseRev: bRev, targetRev: tRev, drop: dropPct.toFixed(1), dropAmt: dropAmt, baseDateDetail: maxMap[key].maxDate });
        }
      });
    } else {
      const baseMap = getDailyMap(selectedDates.base);
      Object.keys(baseMap).forEach(key => {
        const bRev = baseMap[key].revenue, tRev = targetMap[key]?.revenue || 0;
        const dropAmt = bRev - tRev;
        const dropPct = bRev > 0 ? (dropAmt / bRev) * 100 : 0;
        let isAnomaly = false;
        const hasPct = minDropPct !== '', hasAmt = minDropAmt !== '';
        if (hasPct && hasAmt) isAnomaly = dropPct >= Number(minDropPct) || dropAmt >= Number(minDropAmt);
        else if (hasPct) isAnomaly = dropPct >= Number(minDropPct);
        else if (hasAmt) isAnomaly = dropAmt >= Number(minDropAmt);
        else isAnomaly = dropAmt > 0;
        if (bRev >= minBaseRev && isAnomaly) {
          if (!offerSearchTerm || baseMap[key].id.includes(offerSearchTerm)) res.push({ ...baseMap[key], baseRev: bRev, targetRev: tRev, drop: dropPct.toFixed(1), dropAmt: dropAmt });
        }
      });
    }
    res.sort((a, b) => b.dropAmt - a.dropAmt);
    return res.reduce((acc, item) => { if (!acc[item.pubId]) acc[item.pubId] = []; acc[item.pubId].push(item); return acc; }, {});
  }, [data, selectedDates, offerSearchTerm, minDropPct, minDropAmt, minBaseRev, dates]);

  const modalChartData = useMemo(() => {
    if (!selectedOfferForDetail) return null;
    const { id } = selectedOfferForDetail;
    const history = data.filter(d => extractOfferId(d.Offer) === id);
    const pubsFound = Array.from(new Set(history.map(d => d['Pub ID']))).filter(Boolean);
    const allDates = Array.from(new Set(history.map(d => d.Date))).sort((a,b) => String(a).localeCompare(String(b)));
    const chartRows = allDates.map(date => {
      const row = { date };
      pubsFound.forEach(pub => {
        const matches = history.filter(h => h.Date === date && h['Pub ID'] === pub);
        let val = 0;
        if (modalMetric === 'Payout') val = matches.reduce((a, b) => a + (Number(b.Payout !== undefined ? b.Payout : b.Revenue) || 0), 0);
        else if (modalMetric === 'Click') val = matches.reduce((a, b) => a + (Number(b.Click) || 0), 0);
        else if (modalMetric === 'CVR') {
          const c = matches.reduce((a, b) => a + (Number(b.Click) || 0), 0);
          const conv = matches.reduce((a, b) => a + (Number(b.Conversion) || 0), 0);
          val = c > 0 ? (conv / c) * 100 : 0;
        } else if (modalMetric === 'eCPC') {
          const c = matches.reduce((a, b) => a + (Number(b.Click) || 0), 0);
          const r = matches.reduce((a, b) => a + (Number(b.Payout !== undefined ? b.Payout : b.Revenue) || 0), 0);
          val = c > 0 ? (r / c) : 0;
        }
        row[pub] = val;
      });
      return row;
    });
    const dynamicColors = generateColors(pubsFound.length);
    return { data: chartRows, activeMetrics: pubsFound, metricsConfig: pubsFound.map((pub, i) => ({ key: pub, label: pub, color: dynamicColors[i] })) };
  }, [data, selectedOfferForDetail, modalMetric]);

  const formatDateLabel = (dateStr) => {
    if (dateStr === 'max') return '历史最高 Payout';
    if (!dateStr) return '';
    const str = String(dateStr);
    const month = str.slice(4, 6);
    const day = str.slice(-2);
    const index = dates.indexOf(str);
    if (index === 0) return `昨天${day}日`;
    if (index === 1) return `前天${day}日`;
    return `${month}月${day}日`;
  };

  const getSmallDateLabel = (dateStr) => {
    if (!dateStr) return '';
    const str = String(dateStr);
    return `${str.slice(4,6)}月${str.slice(-2)}日`;
  };

  return (
    <div className="space-y-6 relative w-full" style={{minHeight: 'calc(100vh - 200px)'}}>
      <div className="bg-white p-6 rounded-2xl border border-slate-200 flex flex-col gap-4">
        <div className="flex justify-between items-center flex-wrap gap-4">
          <div><h3 className="font-black text-slate-800 flex items-center gap-2"><I name="AlertTriangle" size={20} color="#f43f5e"/> Payout 异常波动检测</h3></div>
          <div className="flex flex-wrap gap-4">
            <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-bold uppercase mb-1">基准 Payout ≥ ($)</span><input type="number" value={minBaseRev} onChange={e => setMinBaseRev(Number(e.target.value))} className="bg-slate-50 border rounded-lg px-3 py-2 text-xs font-bold w-32 outline-none focus:ring-2 focus:ring-blue-500/20"/></div>
            <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-bold uppercase mb-1">跌幅比例 ≥ (%)</span><input type="number" value={minDropPct} onChange={e => setMinDropPct(e.target.value)} className="bg-slate-50 border rounded-lg px-3 py-2 text-xs font-bold w-32 outline-none focus:ring-2 focus:ring-blue-500/20"/></div>
            <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-bold uppercase mb-1">跌幅金额 ≥ ($)</span><input type="number" value={minDropAmt} onChange={e => setMinDropAmt(e.target.value)} className="bg-slate-50 border rounded-lg px-3 py-2 text-xs font-bold w-32 outline-none focus:ring-2 focus:ring-blue-500/20"/></div>
            <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-bold uppercase mb-1">基准日期</span><select value={selectedDates.base} onChange={e => setSelectedDates(s => ({...s, base: e.target.value}))} className="bg-slate-50 border rounded-lg px-3 py-2 text-xs font-bold w-40"><option value="max">周期最高 (Max)</option>{dates.map(d => <option key={d} value={d}>{d}</option>)}</select></div>
            <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-bold uppercase mb-1">目标日期</span><select value={selectedDates.target} onChange={e => setSelectedDates(s => ({...s, target: e.target.value}))} className="bg-slate-50 border rounded-lg px-3 py-2 text-xs font-bold w-40">{dates.map(d => <option key={d} value={d}>{d}</option>)}</select></div>
          </div>
        </div>
        <div className="flex items-center gap-4 pt-2 border-t border-slate-100">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-[10px] font-black text-slate-400 uppercase tracking-wide mr-2">快捷对比:</span>

const CapWarningView = ({ data, onCopy }) => {
  const [minConvThreshold, setMinConvThreshold] = useState(5);
  const groupedWarnings = useMemo(() => {
    const sortedDates = Array.from(new Set(data.map(d => String(d.Date)))).sort((a, b) => String(b).localeCompare(String(a)));
    const dailyMap = {}; const advMap = {};
    data.forEach(d => {
      const date = String(d.Date);
      const advOid = d['Adv Offer ID'] ? String(d['Adv Offer ID']) : extractOfferId(d.Offer);
      if (!advMap[advOid]) advMap[advOid] = d['Advertiser ID'] || '未知广告主';
      if (!dailyMap[date]) dailyMap[date] = {};
      if (!dailyMap[date][advOid]) dailyMap[date][advOid] = { conv: 0, rev: 0 };
      dailyMap[date][advOid].conv += (Number(d.Conversion) || 0);
      dailyMap[date][advOid].rev += (Number(d.Revenue) || 0);
    });
    const warningMap = {};
    for (let i = 0; i < sortedDates.length - 1; i++) {
      const targetDate = sortedDates[i], baseDate = sortedDates[i+1];
      const targetOffers = dailyMap[targetDate], baseOffers = dailyMap[baseDate];
      if (!targetOffers || !baseOffers) continue;
      Object.keys(targetOffers).forEach(advOid => {
        const tConv = targetOffers[advOid].conv, bConv = baseOffers?.[advOid]?.conv || 0;
        if (tConv >= minConvThreshold && tConv === bConv) {
          if (!warningMap[advOid]) warningMap[advOid] = { id: advOid, adv: advMap[advOid], pairs: [], uniqueDates: new Set(), conv: tConv, latestRev: targetOffers[advOid].rev };
          warningMap[advOid].pairs.push(`${baseDate} vs ${targetDate}`);
          warningMap[advOid].uniqueDates.add(baseDate);
          warningMap[advOid].uniqueDates.add(targetDate);
          if (warningMap[advOid].pairs.length === 1) warningMap[advOid].latestRev = targetOffers[advOid].rev;
        }
      });
    }
    const groups = {};
    Object.values(warningMap).forEach(w => {
      const adv = w.adv;
      if (!groups[adv]) groups[adv] = [];
      groups[adv].push({ ...w, daysCount: w.uniqueDates.size, pairDetails: w.pairs.join(', ') });
    });
    Object.values(groups).forEach(arr => arr.sort((a, b) => b.conv - a.conv));
    return groups;
  }, [data, minConvThreshold]);

  return (
    <div className="space-y-6 relative">
      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center flex-wrap gap-4">
        <div><h3 className="font-black text-slate-800 flex items-center gap-2"><I name="Bell" size={20} color="#f59e0b"/> Cap 预警</h3><p className="text-xs text-slate-400 font-bold mt-1">自动扫描相邻日期，按广告主提取连续多日转化数完全一致的 Adv Offer</p></div>
        <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-bold uppercase mb-1">最低相同转化数 ≥</span><input type="number" value={minConvThreshold} onChange={e => setMinConvThreshold(Number(e.target.value))} className="bg-slate-50 border rounded-lg px-3 py-2 text-xs font-bold w-32 outline-none focus:ring-2 focus:ring-amber-500/20"/></div>
      </div>
      {Object.keys(groupedWarnings).length === 0 ? (
        <div className="bg-white rounded-2xl border overflow-hidden shadow-sm p-8 text-center text-slate-400 text-xs font-bold">无 Cap 预警数据</div>
      ) : Object.entries(groupedWarnings).map(([adv, items]) => {
        const uniqueIds = Array.from(new Set(items.map(w => w.id)));
        return (
          <div key={adv} className="bg-white rounded-2xl border overflow-hidden shadow-sm">
            <div className="px-6 py-4 bg-slate-50 border-b flex justify-between items-center">
              <span className="font-bold text-xs uppercase text-slate-700">归属广告主: {adv} ({items.length} 个预警)</span>
              <button onClick={() => onCopy(uniqueIds.join('|'))} className="bg-amber-50 border border-amber-200 text-amber-600 px-4 py-2 rounded-xl text-[10px] font-bold flex items-center gap-2 shadow-sm hover:bg-amber-100"><I name="Copy" size={12}/> 复制 Adv Offer IDs ({uniqueIds.length})</button>
            </div>
            <table className="w-full text-left text-sm">
              <thead className="bg-white text-[10px] uppercase text-slate-500 border-b border-slate-100"><tr><th className="px-6 py-4">Adv Offer ID</th><th className="px-6 py-4">归属 ADV</th><th className="px-6 py-4">连续相同天数</th><th className="px-6 py-4">触发日期详情</th><th className="px-6 py-4 text-amber-600">转化数</th><th className="px-6 py-4">最新当日营收</th></tr></thead>
              <tbody>{items.map((w, i) => (<tr key={i} className="border-b border-slate-50 hover:bg-slate-50"><td className="px-6 py-4 font-bold text-slate-700">{w.id}</td><td className="px-6 py-4 text-slate-500 font-medium">{adv}</td><td className="px-6 py-4 font-black text-amber-600">{w.daysCount} 天</td><td className="px-6 py-4 text-slate-500 text-xs">{w.pairDetails}</td><td className="px-6 py-4 font-black text-amber-600">{w.conv}</td><td className="px-6 py-4 font-bold text-slate-700">${w.latestRev.toFixed(2)}</td></tr>))}</tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
};

      acc[oid].click += (Number(d.Click) || 0); acc[oid].conv += (Number(d.Conversion) || 0); acc[oid].rev += (Number(d.Revenue) || 0); return acc;

const AdvTopView = ({ data, onCopy }) => {
  const [filters, setF] = useState({ minRevenue: 5, minEcpc: 2, minCvr: 1, minClick: 100 });

  const advertiserGroups = useMemo(() => {
    const advMap = {};
    data.forEach(d => {
      const adv = String(d['Advertiser ID'] || 'Unknown');
      const oid = extractOfferId(d.Offer);
      if (!advMap[adv]) advMap[adv] = { adv, totalRev: 0, offers: {} };
      advMap[adv].totalRev += (Number(d.Revenue) || 0);
      if (!advMap[adv].offers[oid]) {
        advMap[adv].offers[oid] = { id: oid, rev: 0, payout: 0, click: 0, cbconv: 0, pkg: d['Package Name'] || '', geo: d['Adv GEO'] || d['Country'] || '' };
      }
      advMap[adv].offers[oid].rev += (Number(d.Revenue) || 0);
      advMap[adv].offers[oid].payout += (Number(d.Payout) || 0);
      advMap[adv].offers[oid].click += (Number(d.Click) || 0);
      advMap[adv].offers[oid].cbconv += (Number(d['Callback Conversion']) || 0);
    });
    return Object.values(advMap).map(a => {
      const all = Object.values(a.offers).map(o => ({ ...o, ecpc: o.click > 0 ? ((o.payout / o.click) * 1000) : 0, cvr: o.click > 0 ? ((o.cbconv / o.click) * 100) : 0 }));
      const filtered = all.filter(o => o.rev >= filters.minRevenue && o.ecpc >= filters.minEcpc && o.cvr >= filters.minCvr && o.click >= filters.minClick);
      return { ...a, filteredOffers: filtered, topRevenue: [...filtered].sort((a, b) => b.rev - a.rev).slice(0, 20), topEcpc: [...filtered].sort((a, b) => b.ecpc - a.ecpc).slice(0, 20), topCvr: [...filtered].sort((a, b) => b.cvr - a.cvr).slice(0, 20) };
    }).filter(a => a.filteredOffers.length > 0).sort((a, b) => b.totalRev - a.totalRev);

  return (
    <div className="space-y-8">
      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-wrap gap-4 items-end">

        <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最低 eCPC</span><input type="number" step="any" value={filters.minEcpc} onChange={e => setF({...filters, minEcpc: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-indigo-500/20"/></div>
        <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最低 CVR (%)</span><input type="number" step="any" value={filters.minCvr} onChange={e => setF({...filters, minCvr: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-indigo-500/20"/></div>
        <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最低 Click</span><input type="number" step="any" value={filters.minClick} onChange={e => setF({...filters, minClick: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-indigo-500/20"/></div>

        <div key={adv.adv} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden p-6">

      <div className="p-6 border-b border-slate-100 flex justify-between items-center">
        <h3 className="font-black text-slate-800">绩效排行 (Top 10 Offers)</h3>
        <button onClick={() => onCopy(topOffers.map(o => extractOfferId(o[0])).join('|'))} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 shadow-md"><I name="Copy" size={14}/> 复制 IDs</button>
      </div>
      {topOffers.map((item, i) => (
        <div key={i} className="px-6 py-4 flex justify-between items-center border-b last:border-0 text-sm hover:bg-slate-50">
          <div className="flex items-center gap-4"><span className="text-xs font-black text-slate-300">NO.{(i+1).toString().padStart(2, '0')}</span><span className="font-medium text-slate-700 truncate max-w-md">{item[0]}</span></div>
          <span className="font-black text-blue-600">${item[1].toFixed(2)}</span>
        </div>
      ))}
    </div>
  );
};

const ExpansionView = ({ data, filters, setFilters, onCopy }) => {
  const recommendations = useMemo(() => {
    const pubs = Array.from(new Set(data.map(d => String(d['Pub ID'] || '')))).filter(p => p !== 'undefined' && p !== '').sort();
    const globalStats = {}, localStats = {};
    data.forEach(d => {
      const pubId = String(d['Pub ID']), oid = extractOfferId(d.Offer);
      if (!globalStats[oid]) globalStats[oid] = { id: oid, name: d.Offer, totalRev: 0, totalClick: 0, totalConv: 0, byPub: {}, advertiserId: d['Advertiser ID'] || '', pkg: d['Package Name'] || '', geo: d['Adv GEO'] || d['Country'] || '' };
      globalStats[oid].totalRev += (Number(d.Revenue) || 0);
      globalStats[oid].totalClick += (Number(d.Click) || 0);
      globalStats[oid].totalConv += (Number(d.Conversion) || 0);
      globalStats[oid].byPub[pubId] = true;
      if (!localStats[pubId]) localStats[pubId] = {};
      if (!localStats[pubId][oid]) localStats[pubId][oid] = { id: oid, rev: 0, payout: 0, click: 0, conv: 0, cbconv: 0, pkg: d['Package Name'] || '', geo: d['Adv GEO'] || d['Country'] || '' };
      localStats[pubId][oid].rev += (Number(d.Revenue) || 0);
      localStats[pubId][oid].payout += (Number(d.Payout) || 0);
      localStats[pubId][oid].click += (Number(d.Click) || 0);
      localStats[pubId][oid].conv += (Number(d.Conversion) || 0);
      localStats[pubId][oid].cbconv += (Number(d['Callback Conversion']) || 0);
    });
    return pubs.map(pub => {
      const isSameAdv = (pS, aS) => { const cP = pS.replace(/^\d+-/, '').toLowerCase().trim(), cA = aS.replace(/^\d+-/, '').toLowerCase().trim(); return cP === cA || (cP.length > 2 && cA.length > 2 && (cP.includes(cA) || cA.includes(cP))); };
      const blueOcean = Object.values(globalStats).map(o => ({...o, cvr: o.totalClick > 0 ? (o.totalConv / o.totalClick) * 100 : 0, ecpc: o.totalClick > 0 ? o.totalRev / o.totalClick : 0})).filter(o => !o.byPub[pub] && !isSameAdv(pub, o.advertiserId) && (o.totalRev >= filters.minRevenue) && (o.totalConv >= filters.minConv) && (o.ecpc >= filters.minEcpcBlue) && (o.cvr >= filters.minCvrBlue)).sort((a,b)=>b.totalRev-a.totalRev);
      const pubOffers = Object.values(localStats[pub]).map(o => ({...o, ecpc: o.click > 0 ? ((o.payout/o.click)*1000) : 0, cvr: o.click > 0 ? ((o.cbconv/o.click)*100) : 0})).filter(o => o.payout >= filters.minPayout && o.ecpc >= filters.minEcpc && o.cvr >= filters.minCvr && o.click >= filters.minClickEcpc);
      return { pub, blueOcean, topEcpc: [...pubOffers].sort((a,b)=>b.ecpc-a.ecpc).slice(0, 20), topCvr: [...pubOffers].sort((a,b)=>b.cvr-a.cvr).slice(0, 20) };
    }).filter(r => r.blueOcean.length > 0 || r.topEcpc.length > 0);
  }, [data, filters]);

  const copyFormatted = (items, type) => { const text = items.map(o => type === 'ecpc' ? `${o.id}|${o.pkg}|${o.geo} ecpc：${o.ecpc.toFixed(2)}` : type === 'cvr' ? `${o.id}|${o.pkg}|${o.geo} cvr：${o.cvr.toFixed(2)}%` : `${o.id}|${o.pkg}|${o.geo}`).join('\n'); copyToClipboard(text); onCopy(text); };
  const copyIds = (items) => onCopy(items.map(o => o.id).join('|'));

  return (
    <div className="space-y-8">
       <div className="bg-white p-6 rounded-2xl border border-slate-200 flex flex-wrap gap-6 items-end shadow-sm">
        <div className="flex items-center gap-3">
          <span className="text-[11px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">推荐 offer</span>
          <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最小营收 ($)</span><input type="number" step="any" value={filters.minRevenue} onChange={e => setFilters({...filters, minRevenue: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-blue-500/20"/></div>
          <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最小转化数</span><input type="number" step="any" value={filters.minConv} onChange={e => setFilters({...filters, minConv: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-blue-500/20"/></div>
          <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最小 eCPC</span><input type="number" step="any" value={filters.minEcpcBlue} onChange={e => setFilters({...filters, minEcpcBlue: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-blue-500/20"/></div>
          <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最小 CVR (%)</span><input type="number" step="any" value={filters.minCvrBlue} onChange={e => setFilters({...filters, minCvrBlue: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-blue-500/20"/></div>
        </div>
        <div className="h-8 w-px bg-slate-200"></div>
        <div className="flex items-center gap-3">
          <span className="text-[11px] font-black text-rose-600 bg-rose-50 px-2 py-0.5 rounded-md">Top 20 eCPC / CVR</span>
          <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最低 Payout ($)</span><input type="number" step="any" value={filters.minPayout} onChange={e => setFilters({...filters, minPayout: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-rose-500/20"/></div>
          <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最低 eCPC</span><input type="number" step="any" value={filters.minEcpc} onChange={e => setFilters({...filters, minEcpc: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-rose-500/20"/></div>
          <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最低 CVR (%)</span><input type="number" step="any" value={filters.minCvr} onChange={e => setFilters({...filters, minCvr: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-emerald-500/20"/></div>
          <div className="flex flex-col"><span className="text-[10px] font-black text-slate-400 uppercase mb-1">最低 Click</span><input type="number" step="any" value={filters.minClickEcpc} onChange={e => setFilters({...filters, minClickEcpc: Number(e.target.value)})} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold w-24 outline-none focus:ring-2 focus:ring-rose-500/20"/></div>
        </div>
        <div className="ml-auto flex items-center gap-4">
          <div className="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2"><I name="Info" size={14}/> 共分析 {data.length} 条原始数据</div>
        </div>
      </div>
      {recommendations.map(res => (
        <div key={res.pub} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden p-6">
          <div className="flex items-center gap-3 mb-6 border-l-4 border-blue-600 pl-4"><h3 className="text-lg font-black text-slate-800">Channel: <span className="text-blue-600">{getPubLabel(res.pub)}</span></h3></div>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div className="bg-slate-50/50 rounded-xl p-5 border border-slate-100">
              <div className="flex justify-between items-center mb-4">
                <h4 className="font-black text-slate-700 text-sm flex items-center gap-2"><I name="Compass" size={16} color="#3b82f6"/> 可向 {getPubLabel(res.pub)} 推荐 (NEW)</h4>
                <div className="flex gap-2"><button onClick={() => copyIds(res.blueOcean)} className="bg-white border border-slate-200 text-slate-600 px-2 py-1 rounded text-[10px] font-bold hover:bg-slate-50">复制 ID</button><button onClick={() => copyFormatted(res.blueOcean)} className="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[10px] font-bold hover:bg-blue-200">复制格式</button></div>
              </div>
              <div className="flex flex-wrap gap-2">
                {res.blueOcean.slice(0, 12).map((o, i) => (<div key={i} className="bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm flex items-center gap-2"><span>{o.id}</span><span className="text-slate-300">|</span><span className="text-emerald-600">${o.totalRev.toFixed(0)}</span></div>))}
                {res.blueOcean.length > 12 && <div className="px-3 py-1.5 text-xs font-bold text-slate-400 flex items-center">+{res.blueOcean.length - 12} more...</div>}
                {res.blueOcean.length === 0 && <div className="text-slate-400 text-xs italic">暂无推荐</div>}
              </div>
            </div>
            <div className="space-y-6">
              <h4 className="font-black text-slate-700 text-sm flex items-center gap-2 mb-2"><I name="Zap" size={16} color="#f59e0b"/> 已有 OFFER 增量 (EXISTING)</h4>
              <div>
                <div className="flex justify-between items-center mb-2"><span className="text-xs font-bold text-rose-500 flex items-center gap-1"><I name="Flame" size={12}/> Top 20 High eCPC</span><div className="flex gap-2"><button onClick={() => copyIds(res.topEcpc)} className="bg-slate-800 text-white px-2 py-0.5 rounded text-[10px] font-bold">ID</button><button onClick={() => copyFormatted(res.topEcpc, 'ecpc')} className="bg-blue-600 text-white px-2 py-0.5 rounded text-[10px] font-bold">Format</button></div></div>
                <div className="flex flex-wrap gap-1.5">{res.topEcpc.map((o, i) => (<span key={i} className="bg-rose-50 border border-rose-100 text-rose-600 px-2 py-1 rounded-md text-[10px] font-mono font-bold">{o.id} <span className="text-rose-400">${o.ecpc.toFixed(2)}</span></span>))}</div>
              </div>
              <div>
                <div className="flex justify-between items-center mb-2"><span className="text-xs font-bold text-emerald-500 flex items-center gap-1"><I name="Diamond" size={12}/> Top 20 High CVR</span><div className="flex gap-2"><button onClick={() => copyIds(res.topCvr)} className="bg-slate-800 text-white px-2 py-0.5 rounded text-[10px] font-bold">ID</button><button onClick={() => copyFormatted(res.topCvr, 'cvr')} className="bg-blue-600 text-white px-2 py-0.5 rounded text-[10px] font-bold">Format</button></div></div>
                <div className="flex flex-wrap gap-1.5">{res.topCvr.map((o, i) => (<span key={i} className="bg-emerald-50 border border-emerald-100 text-emerald-600 px-2 py-1 rounded-md text-[10px] font-mono font-bold">{o.id} <span className="text-emerald-400">{o.cvr.toFixed(2)}%</span></span>))}</div>
              </div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
};

/* ========== App ========== */

const dayOffset = (n) => {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10).replace(/-/g, '');
};

function App() {
  const [rawData, setRawData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [activeTab, setActiveTab] = useState('dashboard');
  const [toast, setToast] = useState('');
  const [dateFrom, setDateFrom] = useState(dayOffset(7));
  const [dateTo, setDateTo] = useState(dayOffset(1));
  const [lastRefresh, setLastRefresh] = useState(null);
  const [latestData, setLatestData] = useState({ latest_date: '', latest_created: '' });
  const [unknownIds, setUnknownIds] = useState({ pubs: [], advs: [] });
  const [filters, setFilters] = useState({ minRevenue: 5, minConv: 20, minClicks: 1000, maxCvr: 0.1, maxEcpc: 0.1,                                       maxRevenue: 1, minPayout: 1, minEcpc: 1, minCvr: 1, minClickEcpc: 100, minEcpcBlue: 1, minCvrBlue: 0.5 });

  const loadData = useCallback(async (from, to) => {
    setLoading(true);
    setError('');
    try {
      const rows = await fetchReport(from || dateFrom, to || dateTo);
      const jkMids = new Set(Object.entries(pubNameMap).filter(([m, n]) => String(n).toLowerCase().includes('jk')).map(([m]) => m));
      let processed = rows;
      if (jkMids.size > 0) {
        processed = rows.map(r => jkMids.has(String(r['Pub ID'])) ? { ...r, 'Pub ID': 'jk-all' } : r);
      }
      setRawData(processed);
      setLastRefresh(new Date());
      setUnknownIds(detectUnknown(processed));
      fetchLatest().then(setLatestData);
    } catch (e) {
      setError('数据加载失败: ' + e.message);
    } finally {
      setLoading(false);
    }
  }, [dateFrom, dateTo]);

  useEffect(() => { fetchPubNames().then(() => fetchAdvNames()).then(() => { loadData(); fetchLatest().then(setLatestData); }); }, []);

  useEffect(() => {
    const timer = setInterval(() => loadData(), 3600000);
    return () => clearInterval(timer);
  }, [loadData]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2000); };

  const handleDateApply = (from, to) => {
    setDateFrom(from);
    setDateTo(to);
    loadData(from, to);
  };

  const tabLabel = { dashboard: "总览看板", trend: "趋势分析", packageScout: "包名透视", anomaly: "异常监控", capWarning: "Cap预警", exclusion: "每日剔除", expansion: "拓量蓝海", advtop: "adv-top", ranking: "绩效排行" };

  return (
    <div className="flex h-screen bg-[#F8FAFC] text-slate-700 overflow-hidden font-sans">
      {toast && (<div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-2"><I name="CheckCircle2" size={16} color="#34d399"/> <span className="text-sm font-bold">{toast}</span></div>)}
      <div className="w-64 bg-white border-r flex flex-col shrink-0 fixed left-0 top-0 bottom-0 z-10">
        <div className="p-8 flex items-center gap-2 font-black text-2xl text-blue-600 italic">分析助手-zhe</div>
        <nav className="flex-1 px-4 space-y-1 overflow-y-auto">
          <NavItem iconName="LayoutDashboard" label="总览看板" active={activeTab==='dashboard'} onClick={()=>setActiveTab('dashboard')}/>
          <NavItem iconName="LineChart" label="趋势分析" active={activeTab==='trend'} onClick={()=>setActiveTab('trend')}/>
          <NavItem iconName="Package" label="包名透视" active={activeTab==='packageScout'} onClick={()=>setActiveTab('packageScout')}/>
          <NavItem iconName="AlertTriangle" label="异常监控" active={activeTab==='anomaly'} onClick={()=>setActiveTab('anomaly')}/>
          <NavItem iconName="Bell" label="Cap预警" active={activeTab==='capWarning'} onClick={()=>setActiveTab('capWarning')}/>
          <NavItem iconName="FilterX" label="每日剔除" active={activeTab==='exclusion'} onClick={()=>setActiveTab('exclusion')}/>
          <NavItem iconName="Compass" label="拓量蓝海" active={activeTab==='expansion'} onClick={()=>setActiveTab('expansion')}/>
          <NavItem iconName="Zap" label="adv-top" active={activeTab==='advtop'} onClick={()=>setActiveTab('advtop')}/>
          <NavItem iconName="Award" label="绩效排行" active={activeTab==='ranking'} onClick={()=>setActiveTab('ranking')}/>
        </nav>
        {lastRefresh && <div className="px-4 py-3 border-t text-[10px] text-slate-400 font-bold space-y-1"><div className="flex items-center gap-1.5"><I name="CheckCircle2" size={12} color="#10b981"/> 刷新: {lastRefresh.toLocaleTimeString()}</div>{latestData.latest_date && <div className="flex items-center gap-1.5"><I name="Calendar" size={12} color="#3b82f6"/> 数据至: {latestData.latest_date.slice(4,6)}月{latestData.latest_date.slice(6,8)}日 {latestData.latest_created ? latestData.latest_created.slice(11,19) : ''}</div>}</div>}
      </div>
      <div className="flex-1 flex flex-col overflow-hidden ml-64">
        <header className="h-16 px-8 flex items-center bg-white border-b shrink-0 justify-between">
          <h2 className="font-bold text-slate-800 text-lg uppercase tracking-widest">{tabLabel[activeTab]}</h2>
        </header>
        <div className="px-8 pt-4 shrink-0">
          <DateRangePicker dateFrom={dateFrom} dateTo={dateTo} onApply={handleDateApply} onRefresh={() => loadData()} loading={loading}/>
          {error && <div className="mt-2 text-rose-500 text-sm font-bold">{error}</div>}
          {(unknownIds.pubs.length > 0 || unknownIds.advs.length > 0) && (
            <div className="mt-2 bg-amber-50 border border-amber-200 rounded-xl p-3 flex items-start gap-3 text-xs">
              <I name="AlertTriangle" size={16} color="#f59e0b"/>
              <div className="space-y-1">
                <span className="font-black text-amber-700">未知 ID 告警</span>
                {unknownIds.pubs.length > 0 && <div className="text-amber-600">未知 Pub ID（需补充 pub 名称）：<code className="bg-amber-100 px-1 rounded">{unknownIds.pubs.join(', ')}</code></div>}
                {unknownIds.advs.length > 0 && <div className="text-amber-600">未知 Adv ID（需补充广告主名称）：<code className="bg-amber-100 px-1 rounded">{unknownIds.advs.join(', ')}</code></div>}
                <div className="text-amber-500 text-[10px]">请将对应的名称告诉 Agent，更新映射表</div>
              </div>
            </div>
          )}
        </div>
        <main className="flex-1 overflow-y-scroll p-8 pt-4">
          {loading && rawData.length === 0 ? (
            <div className="h-96 flex flex-col items-center justify-center text-slate-400 gap-4"><svg className="animate-spin h-10 w-10 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p className="font-bold">正在加载数据...</p></div>
          ) : (
            <>
              {activeTab === 'dashboard' && <DashboardView data={rawData} />}
              {activeTab === 'trend' && <TrendExplorerView data={rawData} />}
              {activeTab === 'packageScout' && <PackageScoutView data={rawData} />}
              {activeTab === 'anomaly' && <AnomalyView data={rawData} onCopy={t => {copyToClipboard(t); showToast("复制成功");}} />}
              {activeTab === 'capWarning' && <CapWarningView data={rawData} onCopy={t => {copyToClipboard(t); showToast("预警ID已复制");}} />}
              {activeTab === 'exclusion' && <ExclusionView data={rawData} filters={filters} setFilters={setFilters} onCopy={t => {copyToClipboard(t); showToast("已复制名单");}} />}
              {activeTab === 'expansion' && <ExpansionView data={rawData} filters={filters} setFilters={setFilters} onCopy={t => {copyToClipboard(t); showToast("IDs 已复制");}} />}
              {activeTab === 'advtop' && <AdvTopView data={rawData} onCopy={t => {copyToClipboard(t); showToast("IDs 已复制");}} />}
              {activeTab === 'ranking' && <RankingView data={rawData} onCopy={t => {copyToClipboard(t); showToast("IDs 已复制");}} />}
            </>
          )}
        </main>
      </div>
    </div>
  );
}

try {
  if (typeof React === 'undefined') throw new Error('React 未加载');
  if (typeof ReactDOM === 'undefined') throw new Error('ReactDOM 未加载');
  if (!ReactDOM.createRoot) throw new Error('ReactDOM.createRoot 不存在，请检查 React 版本(需18+)');
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="text-align:center;color:#ef4444;padding:40px"><h2 style="font-size:20px;font-weight:bold">&#10060; 加载失败</h2><pre style="margin-top:16px;font-size:13px;text-align:left;background:#fef2f2;padding:16px;border-radius:8px;max-width:700px;margin-left:auto;margin-right:auto;overflow:auto">'+e.message+'\n\n'+e.stack+'</pre></div>';
  console.error(e);
}
</script>
</body>
</html>
